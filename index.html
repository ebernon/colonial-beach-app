<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Colonial Beach, Virginia</title>
  <meta name="description" content="Your complete guide to Colonial Beach, Virginia — restaurants, events, fishing, lodging, tides, and more. The Playground of the Potomac." />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d4f6e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CB Guide" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Colonial Beach, Virginia" />
  <meta property="og:description" content="Your complete guide to the Playground of the Potomac." />
  <meta property="og:image" content="/icons/icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d4f6e; font-family: Georgia, serif; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
    #root { height: 100%; min-height: 100dvh; }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #081c28 0%, #0d4f6e 50%, #1a7a8a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    #splash img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 24px; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4)); }
    #splash h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 3px; }
    #splash p { color: rgba(255,255,255,0.55); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }
    #install-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.15);
      padding: 14px 16px; z-index: 10000;
      align-items: center; gap: 12px;
    }
    #install-banner img { width: 44px; height: 44px; border-radius: 10px; }
    #install-banner .text { flex: 1; }
    #install-banner .text strong { display: block; color: #fff; font-size: 14px; }
    #install-banner .text span { color: rgba(255,255,255,0.6); font-size: 12px; }
    #install-banner button { background: #f9ca24; color: #1a1a1a; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; }
    #install-banner .dismiss { background: none; color: rgba(255,255,255,0.5); font-size: 22px; padding: 4px 8px; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="/icons/icon-512.png" alt="Colonial Beach" />
    <h1>COLONIAL BEACH</h1>
    <p>Virginia · On the Potomac</p>
  </div>

  <div id="install-banner">
    <img src="/icons/icon-192.png" alt="CB Guide" />
    <div class="text">
      <strong>Add to Home Screen</strong>
      <span>Install the Colonial Beach guide</span>
    </div>
    <button id="install-btn">Install</button>
    <button class="dismiss" id="dismiss-btn" aria-label="Dismiss">✕</button>
  </div>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="/app.jsx" data-type="module"></script>

  <script>
    // Hide splash when app loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 600); }
      }, 900);
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    // Android install prompt
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      if (!sessionStorage.getItem('install-dismissed')) banner.style.display = 'flex';
    });
    document.getElementById('install-btn')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null; banner.style.display = 'none';
    });
    document.getElementById('dismiss-btn')?.addEventListener('click', () => {
      banner.style.display = 'none';
      sessionStorage.setItem('install-dismissed', '1');
    });
    window.addEventListener('appinstalled', () => { banner.style.display = 'none'; });
  </script>
</body>
</html>
